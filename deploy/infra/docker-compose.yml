# Shared infrastructure for Astro projects
# Contains only Caddy reverse proxy and Umami analytics
services:
  # One-shot sidecar: chowns named volumes so non-root caddy can use them; only used once
  caddy-init:
    image: alpine:3.24
    command: chown -R 1000:1000 /data /config
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: 'no'

  caddy:
    image: caddy:2.11.4-alpine
    user: '1000:1000'
    depends_on:
      caddy-init:
        condition: service_completed_successfully
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:2019/config/']
      interval: 30s
      timeout: 3s
      retries: 3
    container_name: caddy
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy:/etc/caddy:ro
      - ./certs:/certs:ro
      - /var/www:/var/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - astro-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Umami analytics
  umami:
    image: ghcr.io/umami-software/umami:3.1.0
    container_name: umami
    init: true
    mem_limit: 512m
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/heartbeat || exit 1',
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - astro-frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Umami PostgreSQL database (internal network only)
  umami-db:
    image: postgres:15.16-alpine
    container_name: umami-db
    init: true
    mem_limit: 384m
    command:
      - 'postgres'
      - '-c'
      - 'shared_buffers=128MB'
      - '-c'
      - 'effective_cache_size=512MB'
      - '-c'
      - 'random_page_cost=1.1'
      - '-c'
      - 'max_connections=20'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    volumes:
      - ${UMAMI_DATA_PATH}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U umami -d umami']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Umami DB backup
  umami-db-backup:
    build: ./umami-db-backup
    container_name: umami-db-backup
    init: true
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    environment:
      - POSTGRES_HOST=umami-db
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - ${UMAMI_BACKUP_PATH}:/backups
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  astro-frontend:
    name: astro-frontend
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  caddy_data:
  caddy_config:
