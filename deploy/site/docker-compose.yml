services:
  # Nginx cache for image server
  image-cache:
    image: nginx:1.29.8-alpine
    container_name: spectralcodex-image-cache
    init: true
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx:size=64m
      - /etc/nginx/conf.d
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1/health']
      interval: 30s
      timeout: 3s
      retries: 3
    ports:
      - '127.0.0.1:3100:80' # Localhost access for cache warming
    volumes:
      - ../../services/image-server/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${DEPLOY_MEDIA_PATH}/cache:/var/cache/nginx/ipx
    environment:
      - IPX_SERVER_SECRET=${IPX_SERVER_SECRET}
    depends_on:
      image-server:
        condition: service_healthy
    networks:
      - astro-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Image server (IPX)
  image-server:
    image: spectralcodex-image-server:latest
    build:
      context: ../../services/image-server
      dockerfile: Dockerfile
    container_name: spectralcodex-image-server
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DEPLOY_MEDIA_PATH}/media:/media:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - IPX_FS_DIR=/media
      - IPX_FS_MAX_AGE=31536000
    networks:
      - astro-frontend
    restart: unless-stopped
    mem_limit: 1536m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  astro-frontend:
    name: astro-frontend
    # Created by deploy/infra/docker-compose.yml; infra must be deployed first
    external: true
