# Caddy reverse proxy, Umami analytics, and the imagor image pipeline with nginx cache
# Deployed to /opt/server by `pnpm deploy-infra`
services:
  # One-shot sidecar: chowns named volumes so non-root caddy can use them; only used once
  caddy-init:
    image: alpine:3.24
    command: chown -R 1000:1000 /data /config
    # no network needed; keeps compose from creating an unused default network
    network_mode: none
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: 'no'

  caddy:
    image: caddy:2.11.4-alpine
    user: '1000:1000'
    depends_on:
      caddy-init:
        condition: service_completed_successfully
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:2019/config/']
      interval: 30s
      timeout: 3s
      retries: 3
    container_name: caddy
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy:/etc/caddy:ro
      - ./certs:/certs:ro
      - /var/www:/var/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - astro-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Umami analytics
  umami:
    image: ghcr.io/umami-software/umami:3.1.0
    container_name: umami
    init: true
    mem_limit: 512m
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/heartbeat || exit 1',
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - astro-frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Umami PostgreSQL database (internal network only)
  umami-db:
    image: postgres:15.16-alpine
    container_name: umami-db
    init: true
    mem_limit: 384m
    command:
      - 'postgres'
      - '-c'
      - 'shared_buffers=128MB'
      - '-c'
      - 'effective_cache_size=512MB'
      - '-c'
      - 'random_page_cost=1.1'
      - '-c'
      - 'max_connections=20'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    volumes:
      - ${UMAMI_DATA_PATH}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U umami -d umami']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Umami DB backup
  umami-db-backup:
    build: ./umami-db-backup
    container_name: umami-db-backup
    init: true
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    environment:
      - POSTGRES_HOST=umami-db
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - ${UMAMI_BACKUP_PATH}:/backups
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # nginx cache in front of imagor; serves via Caddy
  image-cache:
    image: nginx:1.30.2-alpine
    container_name: image-cache
    init: true
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx:size=64m
      - /etc/nginx/conf.d
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1/health']
      interval: 30s
      timeout: 3s
      retries: 3
    ports:
      - '127.0.0.1:3100:80'
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${DEPLOY_MEDIA_PATH}/cache:/var/cache/nginx/imagor
    depends_on:
      image-server:
        condition: service_started
    networks:
      - astro-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  image-server:
    image: ghcr.io/cshum/imagor-mozjpeg:1.9.1
    container_name: image-server
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DEPLOY_MEDIA_PATH}/media:/media:ro
    environment:
      - IMAGOR_SECRET=${IMAGE_SERVER_SECRET}
      - IMAGOR_SIGNER_TYPE=sha256
      - IMAGOR_SIGNER_TRUNCATE=${IMAGE_SERVER_SIGNATURE_LENGTH:-20}
      - VIPS_STRIP_METADATA=1
      - VIPS_MOZJPEG=1
      - FILE_LOADER_BASE_DIR=/media
      - HTTP_LOADER_DISABLE=1
      - IMAGOR_CACHE_HEADER_TTL=8760h
      - IMAGOR_DISABLE_PARAMS_ENDPOINT=1
      - IMAGOR_DISABLE_ERROR_BODY=1
      - VIPS_MAX_RESOLUTION=16800000
      - VIPS_MAX_WIDTH=5000
      - VIPS_MAX_HEIGHT=5000
    networks:
      - astro-frontend
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.7
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  cache-warmer:
    build: ./cache-warmer
    profiles: ['jobs']
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    environment:
      # Node sizes its heap from host RAM, ignoring mem_limit; cap it so V8 GCs within budget
      - NODE_OPTIONS=--max-old-space-size=160
      - SITE_URL=${SITE_URL}
      - IMAGE_SERVER_URL=${IMAGE_SERVER_URL}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CACHE_WARM_CONCURRENCY=${CACHE_WARM_CONCURRENCY:-8}
      - JMAP_SESSION_URL=${JMAP_SESSION_URL}
      - JMAP_API_TOKEN=${JMAP_API_TOKEN}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM:-}
      - ALERT_ALWAYS=${ALERT_ALWAYS:-}
      - ALERT_MIN_FAILURES=${ALERT_MIN_FAILURES:-1}
    networks:
      - warmer
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  astro-frontend:
    name: astro-frontend
    driver: bridge
  backend:
    driver: bridge
    internal: true
  # Egress-only; the warmer never touches internal services
  warmer:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
