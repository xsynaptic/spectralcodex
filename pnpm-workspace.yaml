packages:
  - packages/**
  - services/*

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - astro
  - '@astrojs/internal-helpers'
  - '@astrojs/markdown-remark'
  - '@astrojs/mdx'
  - '@astrojs/node'
  - '@astrojs/prism'
  - '@astrojs/react'
  - '@astrojs/rss'
  - '@astrojs/sitemap'
  - '@xsynaptic/eslint-config'
  - '@xsynaptic/unified-tools'
  - rehype-wrap-cjk

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - better-sqlite3
  - esbuild
  - onnxruntime-node
  - protobufjs
  - sharp
  - sqlite3
  - usearch
