packages:
  - packages/**
  - services/*

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - astro
  - '@astrojs/internal-helpers'
  - '@astrojs/markdown-remark'
  - '@astrojs/mdx'
  - '@astrojs/node'
  - '@astrojs/prism'
  - '@astrojs/react'
  - '@astrojs/rss'
  - '@astrojs/sitemap'
  - '@astrojs/telemetry'
  - '@xsynaptic/eslint-config'
  - '@xsynaptic/unified-tools'
  - rehype-wrap-cjk

injectWorkspacePackages: true

allowBuilds:
  '@tailwindcss/oxide': true
  better-sqlite3: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
  sqlite3: true
  usearch: true
