packages:
  - packages/**

# Intended to mitigate supply chain attacks
minimumReleaseAge: 1440
verifyDepsBeforeRun: error
strictDepBuilds: true

minimumReleaseAgeExclude:
  # Bypass the 24h guard while Astro 7 prereleases and @xsynaptic packages still churn
  - 'astro'
  - '@astrojs/mdx'
  - '@astrojs/markdown-satteri'
  - '@astrojs/node'
  - '@astrojs/react'
  - 'satteri'
  - '@xsynaptic/astro-build-logger'
  - '@xsynaptic/eslint-config'
  - '@xsynaptic/rehype-wrap-cjk'
  - '@xsynaptic/satteri-auto-import'
  - '@xsynaptic/satteri-img-group'
  - '@xsynaptic/satteri-wrap-cjk'
  - '@xsynaptic/stylelint-config'
  - '@xsynaptic/unified-tools'
  - '@xsynaptic/unpic-imagor'
  - '@xsynaptic/word-count'

# This is required for pnpm deploy, which we use in combination with the image-server service
injectWorkspacePackages: true

# Astro emits prerender chunks under <root>/dist/ that runtime-import @keyv/sqlite
# via vite.ssr.external; hoist it so Node can resolve it from the root scope
publicHoistPattern:
  - '@keyv/sqlite'

# Astro 7 beta spike: astro-pagefind@2.0.0 caps its astro peer at ^6, which makes
# auto-install-peers pull a phantom astro 6 (+ vite 7). The integration works on 7.
peerDependencyRules:
  allowedVersions:
    'astro-pagefind>astro': '7'
    # eslint-plugin-jsx-a11y@6.10.2 caps its eslint peer at ^9 but uses no APIs
    # removed in ESLint 10. Safe to run on 10 until upstream widens the range.
    'eslint-plugin-jsx-a11y>eslint': '10'

allowBuilds:
  '@tailwindcss/oxide': true
  better-sqlite3: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
  sqlite3: true
  usearch: true
